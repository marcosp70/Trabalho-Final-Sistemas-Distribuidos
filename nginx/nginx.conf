worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Backend: Auth Service (Node.js REST)
    upstream auth_nodes {
        server auth-service:3001;
    }

    # Backend: Chat Service (Node.js WebSocket + REST)
    # Precisamos configurar para lidar com WebSockets também
    upstream chat_nodes {
        # Como no docker-compose temos deploy: replicas: 2, 
        # o Docker DNS resolverá chat-service para os IPs das réplicas, balanceando-os.
        server chat-service:3002;
    }

    server {
        listen 80;

        # Proxy para o Serviço de Autenticação
        location /api/auth/ {
            proxy_pass http://auth_nodes;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy para o Serviço de Chat e WebSockets
        location /socket.io/ {
            proxy_pass http://chat_nodes;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            
            # Necessário para suportar múltiplos workers em socket.io
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy para a API Rest do Chat (histórico, etc)
        location /api/chat/ {
            proxy_pass http://chat_nodes/api/chat/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Tratamento do Frontend - erro de rota não achada -> index.html (SPA) ou apenas servindo normal se for porta diferente
        # Note: no docker-compose expusemos o frontend na 3000 independente, mas podemos servir aqui
        # caso queiramos tudo na mesma porta. Como definimos nginx no 80 e frontend 3000, 
        # o user acessará o front na porta 3000 e as APIs na 80.
        
        # Para ser prático e evitar CORS, vamos fazer o nginx servir o frontend também:
        location / {
            proxy_pass http://frontend:80/;
            proxy_set_header Host $host;
        }
    }
}
