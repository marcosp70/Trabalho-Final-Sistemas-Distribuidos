<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de Chat Distribuído - Trabalho de Sistemas Distribuídos">
    <title>NexChat - Sistema Distribuído</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Auth Screen -->
        <div id="auth-screen" class="screen glass-panel active">
            <div class="auth-box">
                <div class="logo">
                    <span class="logo-icon">💬</span>
                    <h1>NexChat</h1>
                </div>
                <p class="subtitle">Comunicação Distribuída em Tempo Real</p>
                
                <form id="auth-form">
                    <div class="input-group">
                        <label for="username">Usuário</label>
                        <input type="text" id="username" placeholder="Digite seu usuário" required autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" placeholder="Digite sua senha" required>
                    </div>
                    
                    <div class="button-group">
                        <button type="submit" id="btn-login" class="btn btn-primary">Entrar</button>
                        <button type="button" id="btn-register" class="btn btn-secondary">Registrar</button>
                    </div>
                </form>
                <div id="auth-error" class="error-message"></div>
            </div>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen" class="screen hidden">
            <div class="chat-container glass-panel">
                <!-- Sidebar -->
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <div class="user-profile">
                            <div class="avatar" id="my-avatar"></div>
                            <span id="my-username" class="username"></span>
                        </div>
                        <button id="btn-logout" class="btn-icon" title="Sair">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        </button>
                    </div>
                    
                    <div class="contacts-list">
                        <div class="contact active" data-contact="group">
                            <div class="avatar group-avatar">🌍</div>
                            <div class="contact-info">
                                <span class="contact-name">Chat Global (1:N)</span>
                                <span class="contact-status">Sala pública</span>
                            </div>
                        </div>
                        
                        <div class="search-contact">
                            <span style="font-size: 0.8rem; font-weight: 600; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.05em;">Usuários Disponíveis</span>
                        </div>
                        
                        <div id="private-contacts">
                            <!-- Private contacts injected here -->
                        </div>
                    </div>
                </aside>
                
                <!-- Main Chat Area -->
                <main class="chat-area">
                    <div class="chat-header">
                        <div class="active-contact">
                            <div class="avatar" id="current-contact-avatar">🌍</div>
                            <h2 id="current-contact-name">Chat Global</h2>
                        </div>
                    </div>
                    
                    <div class="messages-container" id="messages-container">
                        <!-- Messages injected here -->
                        <div class="empty-state hidden" id="empty-chat">
                            <p>Envie uma mensagem para iniciar a conversa.</p>
                        </div>
                    </div>
                    
                    <form id="message-form" class="message-input-area">
                        <input type="text" id="message-input" placeholder="Digite sua mensagem..." autocomplete="off" required>
                        <button type="submit" class="btn-send">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </form>
                </main>
            </div>
        </div>
    </div>

    <!-- Socket.io -->
    <script src="https://cdn.socket.io/4.7.1/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
